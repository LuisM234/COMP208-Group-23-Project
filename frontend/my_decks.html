<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviseWise – My Decks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-start: #e0f8f0;
            --page-end: #d6e8ff;
            --surface: rgba(255, 255, 255, 0.82);
            --surface-strong: rgba(255, 255, 255, 0.94);
            --surface-border: rgba(255, 255, 255, 0.76);
            --border: #d8e2ee;
            --text-primary: #111111;
            --text-secondary: #64707f;
            --accent: #000000;
            --accent-hover: #2a2a2a;
            --accent-text: #ffffff;
            --danger: #dc3545;
            --nav-height: 62px;
            --pill-radius: 999px;
            --card-radius: 24px;
            --panel-radius: 28px;
            --shadow-soft: 0 22px 52px rgba(88, 103, 128, 0.14);
            --shadow-card: 0 18px 38px rgba(98, 114, 138, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--page-start) 0%, var(--page-end) 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 14px 16px 24px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.55) 0, rgba(255, 255, 255, 0) 34%),
                radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.34) 0, rgba(255, 255, 255, 0) 28%);
            pointer-events: none;
            z-index: -1;
        }

        /*  Top Nav  */
        .top-nav {
            min-height: var(--nav-height);
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: var(--panel-radius);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 12px 20px;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.55em;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.04em;
        }

        .nav-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--accent-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(17, 17, 17, 0.18);
        }

        .top-links {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .top-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: var(--pill-radius);
            border: 1px solid var(--surface-border);
            background: rgba(255, 255, 255, 0.72);
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 12px 24px rgba(108, 122, 148, 0.08);
        }

        .top-link:hover {
            background: rgba(255, 255, 255, 0.96);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .top-link.active {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
            box-shadow: 0 14px 26px rgba(17, 17, 17, 0.18);
        }

        /*  Main  */
        .main {
            margin-top: 22px;
            padding: 22px 8px 30px 14px;
        }

        /*  Stat Cards  */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 34px;
        }

        .stat-card {
            background: var(--surface-strong);
            border: 1px solid var(--surface-border);
            border-radius: var(--card-radius);
            padding: 22px 24px;
            box-shadow: var(--shadow-card);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .stat-label {
            font-size: 0.88em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
            letter-spacing: -0.05em;
        }

        .stat-sub {
            font-size: 0.82em;
            color: var(--text-secondary);
        }

        /*  Deck Section  */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 1.45em;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .section-copy {
            margin-top: 6px;
            font-size: 0.92em;
            color: var(--text-secondary);
            max-width: 620px;
        }

        .section-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: var(--pill-radius);
            padding: 11px 16px;
            font-size: 0.9em;
            color: var(--text-secondary);
            width: 220px;
            box-shadow: 0 12px 28px rgba(108, 122, 148, 0.08);
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 0.92em;
            font-family: inherit;
            background: transparent;
            color: var(--text-primary);
            width: 100%;
        }

        .search-box input::placeholder { color: var(--text-secondary); }

        .search-box svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 18px;
            border: 1px solid var(--surface-border);
            border-radius: var(--pill-radius);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 0.9em;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
            white-space: nowrap;
            box-shadow: 0 12px 26px rgba(108, 122, 148, 0.08);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.96);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 14px 26px rgba(17, 17, 17, 0.2);
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .btn svg {
            width: 14px; height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /*  Deck Grid  */
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .deck-card {
            background: var(--surface-strong);
            border: 1px solid var(--surface-border);
            border-radius: 28px;
            padding: 22px 24px;
            cursor: pointer;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: var(--shadow-card);
        }

        .deck-card:hover {
            box-shadow: 0 24px 40px rgba(89, 106, 131, 0.16);
            transform: translateY(-3px);
        }

        .deck-card-name {
            font-size: 1.08em;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .deck-card-meta {
            font-size: 0.84em;
            color: var(--text-secondary);
            margin-bottom: 18px;
        }

        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.84em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(17, 17, 17, 0.08);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 18px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #111111 0%, #3a3a3a 100%);
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        .deck-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .deck-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: var(--pill-radius);
            font-size: 0.86em;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: white;
            text-decoration: none;
            transition: background 0.18s ease, transform 0.18s ease;
        }

        .deck-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .deck-btn-outline {
            background: rgba(255, 255, 255, 0.84);
            color: var(--text-primary);
            border-color: var(--surface-border);
        }

        .deck-btn-outline:hover { background: rgba(255, 255, 255, 0.98); }

        .deck-btn-icon {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--surface-border);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.84);
            cursor: pointer;
            margin-left: auto;
            transition: background 0.18s ease, transform 0.18s ease;
            flex-shrink: 0;
            box-shadow: 0 12px 24px rgba(108, 122, 148, 0.08);
        }

        .deck-btn-icon:hover {
            background: rgba(255, 255, 255, 0.98);
            transform: translateY(-1px);
        }

        .deck-btn-icon svg {
            width: 15px; height: 15px;
            stroke: var(--text-secondary);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Empty state */
        .empty-decks {
            grid-column: 1 / -1;
            text-align: center;
            padding: 72px 24px;
            color: var(--text-secondary);
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 28px;
            box-shadow: var(--shadow-card);
        }

        .empty-decks p { font-size: 0.95em; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.16);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: rgba(255, 255, 255, 0.94);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--surface-border);
            animation: modalIn 0.18s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 1.08em;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .modal-close {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid var(--surface-border);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-close svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            display: block;
        }
        .modal-field { margin-bottom: 16px; }
        .modal-field label {
            display: block;
            font-size: 0.82em;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .modal-field input, .modal-field textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 22px;
            font-size: 0.94em;
            font-family: inherit;
            outline: none;
            background: rgba(250, 250, 250, 0.95);
            color: var(--text-primary);
        }
        .modal-field input:focus, .modal-field textarea:focus { border-color: #999; background: #fff; }
        .modal-field textarea { resize: vertical; min-height: 88px; }
        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 22px;
            flex-wrap: wrap;
        }
        .modal-error { color: var(--danger); font-size: 0.85em; margin-top: 4px; min-height: 18px; }

        @media (max-width: 1100px) {
            .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .deck-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 900px) {
            body { padding: 14px 14px 24px; }

            .top-nav {
                gap: 12px;
                padding: 12px 16px;
                flex-wrap: wrap;
            }

            .top-links {
                width: 100%;
                margin-left: 0;
                overflow-x: auto;
                padding-bottom: 2px;
            }

            .main {
                margin-top: 18px;
                padding: 0 0 24px;
            }
        }

        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }

            .section-controls {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .search-box { width: 100%; }

            .deck-actions { flex-wrap: wrap; }

            .deck-btn,
            .deck-btn-outline {
                flex: 1 1 180px;
            }
        }

        .avatar-wrapper { position: relative; }
        .avatar-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            min-width: 160px;
            z-index: 999;
            overflow: hidden;
        }
        .avatar-dropdown.open { display: block; }
        .avatar-dropdown a, .avatar-dropdown button {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 12px 16px;
            font-size: 0.88em; font-weight: 500; color: #111;
            text-decoration: none; background: none; border: none;
            cursor: pointer; font-family: inherit; text-align: left;
            transition: background 0.12s;
        }
        .avatar-dropdown a:hover, .avatar-dropdown button:hover { background: #f5f5f5; }
        .avatar-dropdown button.danger { color: #dc3545; }
        .avatar-dropdown button.danger:hover { background: #fff5f5; }
        .avatar-dropdown svg {
            width: 15px; height: 15px; stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;
        }
        .dropdown-divider { height: 1px; background: #f0f0f0; margin: 4px 0; }
    </style>
</head>
<body>

    <!-- Top Nav -->
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-logo">ReviseWise</a>
        <div class="top-links">
            <a href="dashboard.html" class="top-link">Dashboard</a>
            <a href="my_decks.html" class="top-link active">My Decks</a>
            <a href="#" class="top-link">Community</a>
            <a href="progress.html" class="top-link">Progress</a>
        </div>
        <div class="avatar-wrapper" id="avatar-wrapper">
            <div class="nav-avatar" id="user-initials" onclick="document.getElementById('avatar-dropdown').classList.toggle('open');event.stopPropagation();">JD</div>
            <div class="avatar-dropdown" id="avatar-dropdown" onclick="event.stopPropagation();">
                <a href="#">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Account
                </a>
                <div class="dropdown-divider"></div>
                <button class="danger" onclick="localStorage.removeItem('token');localStorage.removeItem('userInitials');window.location.href='index.html';">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Log out
                </button>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="main">

        <div class="section-header">
            <div>
                <div class="section-title">My Decks</div>
                <div class="section-copy">Browse your full library, search quickly, create a new deck, or open one to manage its cards.</div>
            </div>
            <div class="section-controls">
                <div class="search-box">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" placeholder="Search decks...">
                </div>
                <button class="btn btn-primary" id="new-deck-btn">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Deck
                </button>
            </div>
        </div>

        <div class="deck-grid" id="deck-grid">
            <!-- populated by JS -->
        </div>

    </main>

    <!-- New Deck Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Create New Deck</div>
                <button class="modal-close" id="modal-close-btn">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-field">
                <label for="modal-name">Deck Name</label>
                <input type="text" id="modal-name" placeholder="e.g. Biology – Cell Structure">
            </div>
            <div class="modal-field">
                <label for="modal-desc">Description (optional)</label>
                <textarea id="modal-desc" placeholder="What's this deck about?"></textarea>
            </div>
            <div class="modal-error" id="modal-error"></div>
            <div class="modal-footer">
                <button class="btn" id="modal-cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="modal-save-btn">Create Deck</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:8000'
        : 'https://comp208-group-23-project-production.up.railway.app';

        const initials = localStorage.getItem('userInitials') || 'JD';
        document.getElementById('user-initials').innerText = initials;

        function authHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                ...(token ? { 'Authorization': `Bearer ${token}` } : {})
            };
        }

        let allDecks = [];

        //  Recent Deck Tracking 
        function recordRecentDeck(id) {
            let recent = JSON.parse(localStorage.getItem('recentDecks') || '[]');
            recent = [id, ...recent.filter(r => r !== id)];
            recent = recent.slice(0, 3);
            localStorage.setItem('recentDecks', JSON.stringify(recent));
        }

        //  Render deck grid 
        function renderDecks(decks) {
            const grid = document.getElementById('deck-grid');
            if (!decks.length) {
                grid.innerHTML = `<div class="empty-decks"><p>No decks yet — click "+ New Deck" to get started.</p></div>`;
                return;
            }
            grid.innerHTML = decks.map(deck => {
                const cardCount = deck.cards ?? 0;
                return `
                <div class="deck-card" onclick="window.location.href='deck.html?deck_id=${deck.id}'">
                    <div class="deck-card-name">${deck.title}</div>
                    <div class="deck-card-meta">${cardCount} card${cardCount !== 1 ? 's' : ''}</div>
                    <div class="deck-card-desc">${deck.description || ''}</div>
                    <div class="deck-actions">
                        <a href="study_session.html?deck_id=${deck.id}" class="deck-btn"
                            onclick="event.stopPropagation(); recordRecentDeck(${deck.id})">Study Now</a>
                        <button class="deck-btn deck-btn-outline"
                            onclick="event.stopPropagation(); recordRecentDeck(${deck.id}); window.location.href='study_session.html?deck_id=${deck.id}&mode=cram'">
                            Cram Mode
                        </button>
                        <div class="deck-btn-icon" onclick="event.stopPropagation(); window.location.href='deck.html?deck_id=${deck.id}'" title="Manage deck">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        //  Search 
        document.getElementById('search-input').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderDecks(allDecks.filter(d => d.title.toLowerCase().includes(q)));
        });

        //  New Deck Modal 
        const overlay    = document.getElementById('modal-overlay');
        const modalError = document.getElementById('modal-error');

        document.getElementById('new-deck-btn').addEventListener('click', () => {
            document.getElementById('modal-name').value = '';
            document.getElementById('modal-desc').value = '';
            modalError.innerText = '';
            overlay.classList.add('open');
            document.getElementById('modal-name').focus();
        });

        function closeModal() { overlay.classList.remove('open'); }

        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

        document.getElementById('modal-save-btn').addEventListener('click', async () => {
            const title = document.getElementById('modal-name').value.trim();
            const desc  = document.getElementById('modal-desc').value.trim();
            if (!title) { modalError.innerText = 'Deck name is required.'; return; }
            const btn = document.getElementById('modal-save-btn');
            btn.disabled = true;
            btn.innerText = 'Creating…';
            modalError.innerText = '';
            try {
                const res = await fetch(`${API_BASE}/decks/`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ title, description: desc })
                });
                if (!res.ok) {
                    const e = await res.json().catch(() => ({}));
                    throw new Error(e.detail || `Failed (${res.status})`);
                }
                const deck = await res.json();
                closeModal();
                window.location.href = `deck.html?deck_id=${deck.id}`;
            } catch(err) {
                modalError.innerText = err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Create Deck';
            }
        });

        //  Init 
        async function init() {
            const token = localStorage.getItem('token');
            if (!token || token === 'demo-token') { window.location.href = 'index.html'; return; }
            try {
                const res = await fetch(`${API_BASE}/decks/`, { headers: authHeaders() });
                if (res.status === 401) { window.location.href = 'index.html'; return; }
                if (!res.ok) throw new Error(`Failed to load decks (${res.status})`);
                const decks = await res.json();
                allDecks = await Promise.all(decks.map(async (deck) => {
                    try {
                        const cr = await fetch(`${API_BASE}/decks/${deck.id}/cards`, { headers: authHeaders() });
                        const cards = cr.ok ? await cr.json() : [];
                        return { ...deck, cards: cards.length };
                    } catch { return { ...deck, cards: 0 }; }
                }));
                renderDecks(allDecks);
            } catch(err) {
                document.getElementById('deck-grid').innerHTML =
                    `<div class="empty-decks"><p style="color:#dc3545">⚠️ ${err.message}</p></div>`;
            }
        }

        init();

                document.addEventListener('click', () => {
            const dd = document.getElementById('avatar-dropdown');
            if (dd) dd.classList.remove('open');
        });

    </script>

</body>
</html>
