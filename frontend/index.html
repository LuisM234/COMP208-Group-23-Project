<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviseWise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text-primary: #111111;
            --text-secondary: #666666;
            --accent: #000000;
            --accent-text: #ffffff;
            --danger: #dc3545;
            --pill-radius: 50px;
            --card-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #e0f8f0 0%, #d6e8ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-heading {
            font-size: 2.8em;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .login-subheading {
            font-size: 1em;
            color: var(--text-secondary);
            margin-bottom: 32px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 28px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .auth-tabs {
            display: flex;
            background: #f0f0f0;
            border-radius: var(--pill-radius);
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 11px;
            text-align: center;
            cursor: pointer;
            border-radius: var(--pill-radius);
            font-weight: 600;
            font-size: 0.92em;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: #e0e0e0;
            color: var(--text-primary);
        }

        .input-group { margin-bottom: 16px; }

        .input-group.hidden { display: none; }

        .input-label {
            font-size: 0.82em;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--pill-radius);
            font-size: 0.95em;
            font-family: inherit;
            outline: none;
            background: #fafafa;
            color: var(--text-primary);
            transition: border-color 0.15s;
        }

        .input-field:focus { border-color: #999; background: #fff; }

        .primary-action-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--pill-radius);
            font-size: 1em;
            font-family: inherit;
            cursor: pointer;
            font-weight: 700;
            margin-top: 8px;
            transition: background 0.2s;
            letter-spacing: 0.2px;
        }

        .primary-action-btn:hover { background: #333; }

        #error-message {
            color: var(--danger);
            font-size: 0.88em;
            text-align: center;
            margin-top: 12px;
            min-height: 18px;
        }

        .forgot-password-link {
            display: block;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.88em;
            margin-top: 16px;
            text-decoration: none;
            transition: color 0.15s;
        }

        .forgot-password-link:hover { color: var(--text-primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-heading">ReviseWise</div>
    <div class="login-subheading">Master any subject with spaced repetition</div>

    <div class="card">
        <div class="auth-tabs">
            <div id="tab-login" class="auth-tab active">Login</div>
            <div id="tab-signup" class="auth-tab">Sign Up</div>
        </div>

        <form id="auth-form">
            <div class="input-group hidden" id="username-group">
                <label class="input-label" for="username">Username</label>
                <input class="input-field" type="text" id="username" placeholder="Your username">
            </div>
            <div class="input-group">
                <label class="input-label" for="email">Email</label>
                <input class="input-field" type="email" id="email" placeholder="youremail@example.com" required>
            </div>
            <div class="input-group">
                <label class="input-label" for="password">Password</label>
                <input class="input-field" type="password" id="password" placeholder="••••••••••••" required>
            </div>
            <button id="submit-btn" class="primary-action-btn" type="submit">Sign in</button>
        </form>

        <div id="error-message"></div>
        <a href="#" id="forgot-password" class="forgot-password-link">Forgot password?</a>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const forgotPasswordLink = document.getElementById('forgot-password');
        const errorMessage = document.getElementById('error-message');
        const usernameGroup = document.getElementById('username-group');
        const usernameInput = document.getElementById('username');

        let isLoginMode = true;

        function formatError(data) {
            return (data.detail && data.detail[0] && data.detail[0].msg)
                ? data.detail[0].msg
                : (data.detail || "Check your input fields.");
        }

        function storeSession(token, displayName) {
            localStorage.setItem('token', token);
            localStorage.setItem(
                'userInitials',
                (displayName || 'JD').substring(0, 2).toUpperCase()
            );
        }

        async function postJson(endpoint, payload) {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(payload)
            });

            let data = {};
            try {
                data = await response.json();
            } catch (error) {
                data = {};
            }

            return { response, data };
        }

        tabLogin.addEventListener('click', () => {
            isLoginMode = true;
            tabLogin.classList.add('active');
            tabSignup.classList.remove('active');
            submitBtn.innerText = "Sign in";
            forgotPasswordLink.classList.remove('hidden');
            errorMessage.innerText = "";
            usernameGroup.classList.add('hidden');
            usernameInput.required = false;
        });

        tabSignup.addEventListener('click', () => {
            isLoginMode = false;
            tabSignup.classList.add('active');
            tabLogin.classList.remove('active');
            submitBtn.innerText = "Create Account";
            forgotPasswordLink.classList.add('hidden');
            errorMessage.innerText = "";
            usernameGroup.classList.remove('hidden');
            usernameInput.required = true;
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const emailValue = document.getElementById('email').value;
            const passwordValue = document.getElementById('password').value;
            const usernameValue = usernameInput.value;

            try {
                if (isLoginMode) {
                    const { response, data } = await postJson(`${API_BASE}/auth/login`, {
                        email: emailValue,
                        password: passwordValue
                    });

                    if (!response.ok) {
                        errorMessage.innerText = formatError(data);
                        return;
                    }

                    storeSession(data.access_token, emailValue);
                    window.location.href = 'dashboard.html';
                    return;
                }

                const signupResult = await postJson(`${API_BASE}/auth/signup`, {
                    username: usernameValue,
                    email: emailValue,
                    password: passwordValue
                });

                if (!signupResult.response.ok) {
                    errorMessage.innerText = formatError(signupResult.data);
                    return;
                }

                const loginResult = await postJson(`${API_BASE}/auth/login`, {
                    email: emailValue,
                    password: passwordValue
                });

                if (!loginResult.response.ok || !loginResult.data.access_token) {
                    errorMessage.innerText = "Account created, but automatic sign in failed.";
                    return;
                }

                storeSession(loginResult.data.access_token, usernameValue || emailValue);
                window.location.href = 'dashboard.html';
            } catch (error) {
                // For demo: redirect directly to dashboard
                storeSession('demo-token', isLoginMode ? emailValue : (usernameValue || emailValue));
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
