<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReviseWise – Study Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-start: #e0f8f0;
      --page-end: #d6e8ff;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: rgba(255, 255, 255, 0.94);
      --surface-border: rgba(255, 255, 255, 0.76);
      --border: #d8e2ee;
      --text-primary: #111111;
      --text-secondary: #64707f;
      --accent: #000000;
      --accent-hover: #2a2a2a;
      --accent-text: #ffffff;
      --nav-height: 62px;
      --pill-radius: 999px;
      --card-radius: 24px;
      --panel-radius: 28px;
      --shadow-soft: 0 22px 52px rgba(88, 103, 128, 0.14);
      --shadow-card: 0 18px 38px rgba(98, 114, 138, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--page-start) 0%, var(--page-end) 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 14px 16px 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.55) 0, rgba(255, 255, 255, 0) 34%),
        radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.34) 0, rgba(255, 255, 255, 0) 28%);
      pointer-events: none;
      z-index: -1;
    }

    /*  Top Nav  */
    .top-nav {
      min-height: var(--nav-height);
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--panel-radius);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 12px 20px;
      z-index: 100;
    }

    .nav-logo {
      font-size: 1.55em;
      font-weight: 800;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.04em;
    }

    .nav-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78em;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(17, 17, 17, 0.18);
    }

    .top-links {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .top-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: var(--pill-radius);
      border: 1px solid var(--surface-border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text-secondary);
      font-size: 0.9em;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 12px 24px rgba(108, 122, 148, 0.08);
    }

    .top-link:hover {
      background: rgba(255, 255, 255, 0.96);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    .top-link.active {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
      box-shadow: 0 14px 26px rgba(17, 17, 17, 0.18);
    }

    /*  Main layout  */
    .main {
      margin-top: 22px;
      min-height: calc(100vh - 96px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 16px 34px;
      overflow-y: auto;
    }

    .session-wrap {
      width: 100%;
      max-width: 820px;
    }

    /*  Session Header  */
    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      gap: 12px;
    }

    .session-title {
      font-size: 1.85em;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .session-subtitle {
      font-size: 0.9em;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .close-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--surface-border);
      background: rgba(255, 255, 255, 0.84);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 15px;
      transition: background 0.12s, transform 0.12s;
      flex-shrink: 0;
      text-decoration: none;
      line-height: 1;
      box-shadow: 0 12px 24px rgba(108, 122, 148, 0.08);
    }
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.96);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /*  Progress  */
    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.84em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(17, 17, 17, 0.08);
      border-radius: 999px;
      margin-bottom: 28px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(17, 17, 17, 0.04);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #111111 0%, #3a3a3a 100%);
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    /* ─
       FLIP CARD
    ─ */
    .card-scene {
      width: 100%;
      perspective: 1400px;
      margin-bottom: 8px;
    }

    .card-flipper {
      position: relative;
      width: 100%;
      height: 320px;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(.4, 0, .2, 1);
      cursor: pointer;
    }

    .card-flipper.is-flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--surface-strong);
      border: 1px solid var(--surface-border);
      border-radius: 30px;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 60px;
      text-align: center;
    }

    .card-back-face {
      transform: rotateY(180deg);
    }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
      letter-spacing: 0.2px;
    }

    .badge-q { background: #111; color: #fff; }
    .badge-a { background: rgba(255, 255, 255, 0.88); border: 1px solid var(--surface-border); color: var(--text-secondary); }

    .question-text {
      font-size: 1.5em;
      font-weight: 600;
      color: #111;
      line-height: 1.4;
      letter-spacing: -0.2px;
      max-width: 520px;
    }

    .show-btn {
      background: #111;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: var(--pill-radius);
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 28px;
      transition: background 0.15s, transform 0.15s;
      box-shadow: 0 14px 26px rgba(17, 17, 17, 0.18);
    }
    .show-btn:hover { background: #333; transform: translateY(-1px); }

    /* Back face content */
    .q-small {
      font-size: 0.88em;
      color: #9aa5b5;
      margin-bottom: 14px;
      max-width: 480px;
      line-height: 1.5;
    }

    .answer-divider {
      width: 48px; height: 1px;
      background: rgba(17, 17, 17, 0.12);
      margin: 0 auto 18px;
    }

    .answer-text {
      font-size: 1.3em;
      font-weight: 600;
      color: #111;
      line-height: 1.55;
      letter-spacing: -0.2px;
      max-width: 520px;
    }

    /* Click hint */
    .flip-hint {
      font-size: 11.5px;
      color: #95a0b0;
      text-align: center;
      margin-bottom: 18px;
    }

    /*  Rating  */
    .rating-section {
      margin-top: 4px;
    }

    .rating-label {
      font-size: 0.88em;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 12px;
    }

    .rating-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .rate-btn {
      background: var(--surface-strong);
      border: 1px solid var(--surface-border);
      border-radius: 22px;
      padding: 16px 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: background 0.12s, border-color 0.12s, transform 0.12s;
      box-shadow: 0 14px 26px rgba(108, 122, 148, 0.08);
    }
    .rate-btn:hover {
      background: rgba(255, 255, 255, 0.98);
      border-color: #c8d2de;
      transform: translateY(-1px);
    }

    .rate-emoji { font-size: 22px; line-height: 1; }
    .rate-name  { font-size: 13px; font-weight: 600; color: #111; }
    .rate-time  { font-size: 11px; color: #8f9aaa; }

    .sr-note {
      font-size: 11px;
      color: #8f9aaa;
      text-align: center;
    }

    /*  Keyboard hints  */
    .kbd-hints {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 22px;
    }

    .hint {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #8f9aaa;
    }

    .kbd {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      color: #555;
    }

    /*  Done / Empty  */
    .done-card {
      background: var(--surface-strong);
      border: 1px solid var(--surface-border);
      border-radius: 30px;
      padding: 64px 40px;
      text-align: center;
      margin-bottom: 24px;
      box-shadow: var(--shadow-card);
    }

    .done-icon  { font-size: 44px; margin-bottom: 18px; }
    .done-title { font-size: 1.4em; font-weight: 700; margin-bottom: 8px; }
    .done-sub   { font-size: 0.9em; color: var(--text-secondary); margin-bottom: 28px; }

    .done-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    .restart-btn {
      background: #111; color: #fff;
      border: 1px solid #111;
      padding: 12px 28px;
      border-radius: var(--pill-radius);
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      box-shadow: 0 14px 26px rgba(17, 17, 17, 0.18);
    }
    .restart-btn:hover { background: #333; border-color: #333; transform: translateY(-1px); }

    .restart-btn.outline {
      background: rgba(255, 255, 255, 0.84);
      color: #111;
      border-color: var(--surface-border);
      box-shadow: 0 12px 24px rgba(108, 122, 148, 0.08);
    }
    .restart-btn.outline:hover { background: rgba(255, 255, 255, 0.98); }

    @media (max-width: 900px) {
      body { padding: 14px 14px 24px; }

      .top-nav {
        gap: 12px;
        padding: 12px 16px;
        flex-wrap: wrap;
      }

      .top-links {
        width: 100%;
        margin-left: 0;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .main {
        margin-top: 18px;
        padding: 0 0 30px;
      }
    }

    @media (max-width: 720px) {
      .card-face {
        padding: 36px 26px;
      }

      .question-text,
      .answer-text {
        font-size: 1.15em;
      }

      .rating-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .kbd-hints,
      .done-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .restart-btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="dashboard.html" class="nav-logo">ReviseWise</a>
    <div class="top-links">
      <a href="dashboard.html" class="top-link">Dashboard</a>
      <a href="my_decks.html" class="top-link active">My Decks</a>
      <a href="#" class="top-link">Community</a>
      <a href="progress.html" class="top-link">Progress</a>
    </div>
    <div class="nav-avatar" id="user-initials">JD</div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="session-wrap" id="app">
      <div style="text-align:center;color:#aaa;padding:60px 0">Loading cards…</div>
    </div>
  </main>

  <script>
    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:8000'
        : 'https://comp208-group-23-project-production.up.railway.app';
    const DECK_ID = new URLSearchParams(window.location.search).get('deck_id') || 2;
    const MODE = new URLSearchParams(window.location.search).get('mode') || 'study';


    document.getElementById('user-initials').innerText =
      localStorage.getItem('userInitials') || 'JD';

    let cards     = [];
    let idx       = 0;
    let flipped   = false;
    let deckTitle = 'Study Session';
    let deckSub   = '';
    let ratingInProgress = false;
    let nextDueAt = null;
    let dueTimer = null;
    let dueLoadInProgress = false;

    function authHdr() {
      const t = localStorage.getItem('token');
      return { 'Content-Type': 'application/json', ...(t ? { 'Authorization': `Bearer ${t}` } : {}) };
    }

    const DEFAULT_TIMINGS = {
      againSeconds: 60,
      hardSeconds: 360,
      goodSeconds: 600,
      easySeconds: 345600
    };

    function getStudyTimings() {
      try {
        return { ...DEFAULT_TIMINGS, ...JSON.parse(localStorage.getItem('leitnerTimings') || '{}') };
      } catch {
        return DEFAULT_TIMINGS;
      }
    }

    function formatDelay(seconds) {
      if (seconds < 60) return `${seconds} sec${seconds === 1 ? '' : 's'}`;
      if (seconds < 3600) {
        const mins = Math.round(seconds / 60);
        return `${mins} min${mins === 1 ? '' : 's'}`;
      }
      if (seconds < 86400) {
        const hours = Math.round(seconds / 3600);
        return `${hours} hour${hours === 1 ? '' : 's'}`;
      }
      const days = Math.round(seconds / 86400);
      return `${days} day${days === 1 ? '' : 's'}`;
    }

    function formatCountdown(ms) {
      const seconds = Math.max(1, Math.ceil(ms / 1000));
      if (seconds < 60) return `${seconds} sec${seconds === 1 ? '' : 's'}`;
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins < 60) return secs ? `${mins} min ${secs} sec` : `${mins} min`;
      return formatDelay(seconds);
    }

    function ratingDelaySeconds(rating) {
      const timings = getStudyTimings();
      if (rating === 1) return timings.againSeconds;
      if (rating === 2) return timings.hardSeconds;
      if (rating === 3) return timings.goodSeconds;
      return timings.easySeconds;
    }

    async function fetchStudyCards() {
      const endpoint = MODE === 'cram'
        ? `${API}/decks/${DECK_ID}/cards`
        : `${API}/decks/${DECK_ID}/due`;
      const cr = await fetch(endpoint, { headers: authHdr() });
      if (!cr.ok) throw new Error(`Could not load cards (${cr.status})`);
      return await cr.json();
    }

    async function loadStudyCards() {
      clearDueTimer();
      cards = await fetchStudyCards();
      idx = 0;
      flipped = false;
      nextDueAt = null;
    }

    function clearDueTimer() {
      if (dueTimer) {
        clearInterval(dueTimer);
        dueTimer = null;
      }
    }

    function rememberNextDue(nextReview) {
      const due = new Date(nextReview);
      if (Number.isNaN(due.getTime())) return;
      if (!nextDueAt || due < nextDueAt) nextDueAt = due;
    }

    function startDueWatcher() {
      clearDueTimer();
      if (MODE === 'cram' || !nextDueAt) return;

      const update = async () => {
        const remaining = nextDueAt.getTime() - Date.now();
        const copy = document.getElementById('next-due-copy');

        if (remaining > 0) {
          if (copy) copy.innerText = `Next card due in ${formatCountdown(remaining)}. It will load automatically.`;
          return;
        }

        if (dueLoadInProgress) return;
        dueLoadInProgress = true;
        if (copy) copy.innerText = 'Loading due cards...';
        try {
          const dueCards = await fetchStudyCards();
          if (dueCards.length) {
            clearDueTimer();
            cards = dueCards;
            idx = 0;
            flipped = false;
            nextDueAt = null;
            render();
            return;
          }

          nextDueAt = new Date(Date.now() + 3000);
          if (copy) copy.innerText = 'Still checking for the next retry...';
        } catch (err) {
          clearDueTimer();
          document.getElementById('app').innerHTML =
            `<div style="text-align:center;color:#dc3545;padding:60px 0">⚠️ ${err.message}<br><a href="dashboard.html" style="color:#111;margin-top:12px;display:inline-block">← Back to Dashboard</a></div>`;
        } finally {
          dueLoadInProgress = false;
        }
      };

      update();
      dueTimer = setInterval(update, 1000);
    }

    async function init() {
      try {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = 'index.html'; return; }

        const dr = await fetch(`${API}/decks/${DECK_ID}`, { headers: authHdr() });
        if (dr.status === 401) { window.location.href = 'index.html'; return; }
        if (dr.ok) { const d = await dr.json(); deckTitle = d.title || 'Study Session'; deckSub = d.description || ''; }

        await loadStudyCards();
      } catch (err) {
        document.getElementById('app').innerHTML =
          `<div style="text-align:center;color:#dc3545;padding:60px 0">⚠️ ${err.message}<br><a href="dashboard.html" style="color:#111;margin-top:12px;display:inline-block">← Back to Dashboard</a></div>`;
        return;
      }
      render();
    }

    /*  Render  */
    function render() {
      if (!cards.length) { renderEmpty(); return; }
      if (idx >= cards.length) { renderDone(); return; }
      renderCard();
    }

    function renderCard() {
      const card = cards[idx];
      const pct  = Math.round((idx / cards.length) * 100);
      const timings = getStudyTimings();

      document.getElementById('app').innerHTML = `
        <div class="session-header">
          <div>
            <div class="session-title">Study Session</div>
            <div class="session-subtitle">${deckTitle}${MODE === 'cram' ? ' · Cram Mode' : ''}</div>
          </div>
          <a href="javascript:history.back()" class="close-btn" title="Exit">✕</a>
        </div>

        <div class="progress-row">
          <span>Card ${idx + 1} of ${cards.length}</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>

        <div class="card-scene">
          <div class="card-flipper${flipped ? ' is-flipped' : ''}" id="card-flipper" onclick="handleCardClick(event)">

            <!-- FRONT -->
            <div class="card-face">
              <span class="badge badge-q">Question</span>
              <div class="question-text">${card.question ?? card.front ?? ''}</div>
              <button class="show-btn" onclick="event.stopPropagation(); reveal()">Show Answer</button>
            </div>

            <!-- BACK -->
            <div class="card-face card-back-face">
              <span class="badge badge-a">Answer</span>
              <div class="q-small">${card.question ?? card.front ?? ''}</div>
              <div class="answer-divider"></div>
              <div class="answer-text">${card.answer ?? card.back ?? ''}</div>
            </div>

          </div>
        </div>
  </nav>

        ${flipped
          ? `<div class="rating-section">
               <div class="rating-label">How well did you know this?</div>
               <div class="rating-grid">
                 <button class="rate-btn" onclick="rate(1)"><span class="rate-emoji">🤯</span><span class="rate-name">Again</span><span class="rate-time">${formatDelay(timings.againSeconds)}</span></button>
                 <button class="rate-btn" onclick="rate(2)"><span class="rate-emoji">😵</span><span class="rate-name">Hard</span><span class="rate-time">${formatDelay(timings.hardSeconds)}</span></button>
                 <button class="rate-btn" onclick="rate(3)"><span class="rate-emoji">🙂</span><span class="rate-name">Good</span><span class="rate-time">${formatDelay(timings.goodSeconds)}</span></button>
                 <button class="rate-btn" onclick="rate(4)"><span class="rate-emoji">😄</span><span class="rate-name">Easy</span><span class="rate-time">${formatDelay(timings.easySeconds)}</span></button>
               </div>
               <div class="sr-note">Next review intervals use your Settings page timings</div>
             </div>`
          : `<div class="flip-hint">Click card or press <strong>Space</strong> to reveal answer</div>`
        }

        <div class="kbd-hints">
          <div class="hint"><span class="kbd">Space</span> Show answer</div>
          <div class="hint"><span class="kbd">1–4</span> Rate difficulty</div>
        </div>`;
    }

    function renderEmpty() {
      document.getElementById('app').innerHTML = `
        <div class="session-header">
          <div><div class="session-title">Study Session</div><div class="session-subtitle">${deckTitle}</div></div>
          <a href="javascript:history.back()" class="close-btn">✕</a>
        </div>
        <div class="done-card">
          <div class="done-icon">📚</div>
          <div class="done-title">No due cards right now</div>
          <div class="done-sub">This deck either has no cards yet, or everything is scheduled for later.</div>
          <div class="done-actions">
            <a href="deck.html?deck_id=${DECK_ID}" class="restart-btn outline">Go to Deck</a>
            <a href="dashboard.html" class="restart-btn outline">Dashboard</a>
          </div>
        </div>`;
    }

    function renderDone() {
      const dueCopy = MODE === 'study' && nextDueAt
        ? `<div class="done-sub" id="next-due-copy">Checking next due card...</div>`
        : `<div class="done-sub">You reviewed all ${cards.length} card${cards.length !== 1 ? 's' : ''}</div>`;

      document.getElementById('app').innerHTML = `
        <div class="session-header">
          <div><div class="session-title">Session Complete!</div><div class="session-subtitle">${deckTitle}</div></div>
        </div>
        <div class="done-card">
          <div class="done-icon">🎉</div>
          <div class="done-title">Great work!</div>
          ${dueCopy}
          <div class="done-actions">
            <button class="restart-btn" onclick="restart()">Study Again</button>
            <a href="dashboard.html" class="restart-btn outline">Back to Dashboard</a>
          </div>
        </div>`;
      startDueWatcher();
    }

    /* Actions */
    function handleCardClick(e) {
      // Don't flip if clicking the Show Answer button
      if (e.target.classList.contains('show-btn')) return;
      if (!flipped) reveal();
    }

    function reveal() {
      if (flipped) return;
      // Flip first (CSS transition), then re-render with rating buttons
      const flipper = document.getElementById('card-flipper');
      if (flipper) {
        flipper.classList.add('is-flipped');
        setTimeout(() => {
          flipped = true;
          renderCard();
        }, 560);
      } else {
        flipped = true;
        renderCard();
      }
    }

    async function rate(n) {
      if (ratingInProgress) return;
      ratingInProgress = true;
      const card = cards[idx];
      try {
        const res = await fetch(`${API}/cards/${card.id}/review`, {
          method: 'POST', headers: authHdr(),
          body: JSON.stringify({
            rating: n,
            next_review_delay_seconds: ratingDelaySeconds(n)
          })
        });
        if (!res.ok) throw new Error(`Could not save review (${res.status})`);
        const review = await res.json().catch(() => null);
        if (n < 3 && review?.next_review) rememberNextDue(review.next_review);
        idx++;
        flipped = false;
        render();
      } catch (err) {
        alert(err.message);
      } finally {
        ratingInProgress = false;
      }
    }

    async function restart() {
      document.getElementById('app').innerHTML =
        `<div style="text-align:center;color:#aaa;padding:60px 0">Checking due cards…</div>`;
      try {
        await loadStudyCards();
        render();
      } catch (err) {
        document.getElementById('app').innerHTML =
          `<div style="text-align:center;color:#dc3545;padding:60px 0">⚠️ ${err.message}<br><a href="dashboard.html" style="color:#111;margin-top:12px;display:inline-block">← Back to Dashboard</a></div>`;
      }
    }

    /*  Keyboard  */
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') { e.preventDefault(); if (!flipped) reveal(); return; }
      if (!flipped) return;
      if (e.key === '1') rate(1);
      if (e.key === '2') rate(2);
      if (e.key === '3') rate(3);
      if (e.key === '4') rate(4);
    });

    init();
  </script>
</body>
</html>
